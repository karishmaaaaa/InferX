services:
  api:
    build:
      context: .
    environment:
      APP_NAME: ${APP_NAME:-InferX}
      ENVIRONMENT: ${ENVIRONMENT:-local}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: ${API_HOST:-0.0.0.0}
      API_PORT: ${API_PORT:-8000}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://inferx:inferx@postgres:5432/inferx}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      BOOTSTRAP_DEV_DATA: ${BOOTSTRAP_DEV_DATA:-true}
      API_KEY_CACHE_TTL_SECONDS: ${API_KEY_CACHE_TTL_SECONDS:-60}
      LOCAL_FREE_API_KEY: ${LOCAL_FREE_API_KEY:-inferx-free-local}
      LOCAL_PREMIUM_API_KEY: ${LOCAL_PREMIUM_API_KEY:-inferx-premium-local}
      LOCAL_DEV_USER_EMAIL: ${LOCAL_DEV_USER_EMAIL:-local-dev@inferx.internal}
      ENABLE_DEV_PROVIDER: ${ENABLE_DEV_PROVIDER:-true}
      DEV_PROVIDER_LATENCY_MS: ${DEV_PROVIDER_LATENCY_MS:-2}
      DEV_PROVIDER_STREAM_CHUNK_DELAY_MS: ${DEV_PROVIDER_STREAM_CHUNK_DELAY_MS:-350}
      ENABLE_DEMO_CONTROLS: ${ENABLE_DEMO_CONTROLS:-true}
      ENABLE_OLLAMA_PROVIDER: ${ENABLE_OLLAMA_PROVIDER:-false}
      PROVIDER_PRIORITY: ${PROVIDER_PRIORITY:-dev_echo,dev_backup,ollama,groq,openai,gemini,sarvam}
      PROVIDER_REQUEST_TIMEOUT_SECONDS: ${PROVIDER_REQUEST_TIMEOUT_SECONDS:-1}
      PROVIDER_SCORE_INTERVAL_SECONDS: ${PROVIDER_SCORE_INTERVAL_SECONDS:-60}
      PROVIDER_SCORE_WINDOW_SECONDS: ${PROVIDER_SCORE_WINDOW_SECONDS:-300}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-1}
      CIRCUIT_COOLDOWN_SECONDS: ${CIRCUIT_COOLDOWN_SECONDS:-3}
      PROVIDER_HEALTH_CHECK_INTERVAL_SECONDS: ${PROVIDER_HEALTH_CHECK_INTERVAL_SECONDS:-1}
      SEMANTIC_CACHE_ENABLED: ${SEMANTIC_CACHE_ENABLED:-true}
      SEMANTIC_CACHE_THRESHOLD: ${SEMANTIC_CACHE_THRESHOLD:-0.88}
      SEMANTIC_CACHE_TTL_SECONDS: ${SEMANTIC_CACHE_TTL_SECONDS:-3600}
      SEMANTIC_CACHE_MAX_ENTRIES: ${SEMANTIC_CACHE_MAX_ENTRIES:-250}
      SEMANTIC_EMBEDDING_DIMENSIONS: ${SEMANTIC_EMBEDDING_DIMENSIONS:-256}
      REQUEST_QUEUE_MAX_SIZE: ${REQUEST_QUEUE_MAX_SIZE:-2000}
      REQUEST_QUEUE_WORKERS: ${REQUEST_QUEUE_WORKERS:-16}
      USAGE_WRITER_QUEUE_SIZE: ${USAGE_WRITER_QUEUE_SIZE:-50000}
      USAGE_WRITER_WORKERS: ${USAGE_WRITER_WORKERS:-8}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-40}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-80}
      DATABASE_POOL_TIMEOUT_SECONDS: ${DATABASE_POOL_TIMEOUT_SECONDS:-5}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-inferx}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./ops/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  loadtest:
    image: locustio/locust:2.32.8
    profiles:
      - loadtest
    volumes:
      - ./load-tests:/mnt/locust
    environment:
      INFERX_FREE_API_KEY: ${LOCAL_FREE_API_KEY:-inferx-free-local}
      INFERX_PREMIUM_API_KEY: ${LOCAL_PREMIUM_API_KEY:-inferx-premium-local}
    command:
      - "-f"
      - "/mnt/locust/locustfile.py"
      - "--headless"
      - "--host"
      - "http://api:8000"
      - "--users"
      - "${LOCUST_USERS:-100}"
      - "--spawn-rate"
      - "${LOCUST_SPAWN_RATE:-100}"
      - "--run-time"
      - "${LOCUST_RUN_TIME:-30s}"
      - "--csv"
      - "/mnt/locust/results/inferx"
      - "--only-summary"
    depends_on:
      - api

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inferx
      POSTGRES_USER: inferx
      POSTGRES_PASSWORD: inferx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inferx -d inferx"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
